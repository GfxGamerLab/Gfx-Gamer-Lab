<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Aapka original button style */
        .download-btn { display: block; width: 100%; padding: 12px; background: var(--primary); color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: 8px; }
        .btn-info-text { font-size: 11px; color: var(--text-muted); display: block; text-align: center; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="postsList"></div>

    <script>
        async function loadPosts() {
            const container = document.getElementById('postsList');
            const snapshot = await db.collection('posts').orderBy('timestamp', 'desc').get();
            
            container.innerHTML = snapshot.docs.map(doc => {
                const post = doc.data();
                let buttonsMarkup = '';

                // Handle Multiple Buttons
                if (post.buttons && Array.isArray(post.buttons)) {
                    buttonsMarkup = post.buttons.map(btn => `
                        <div class="btn-wrapper" style="margin-bottom: 12px; border-top: 1px solid #333; padding-top: 10px;">
                            ${btn.desc ? `<span class="btn-info-text">${btn.desc}</span>` : ''}
                            <a href="${btn.url}" class="download-btn" target="_blank">
                                <i class="fas fa-download"></i> ${btn.title}
                            </a>
                        </div>
                    `).join('');
                } else if (post.link) {
                    // Purani posts ke liye
                    buttonsMarkup = `<a href="${post.link}" class="download-btn" target="_blank">Download Now</a>`;
                }

                return `
                    <div class="post-card">
                        <h3>${post.title}</h3>
                        <div class="post-actions">
                            ${buttonsMarkup}
                        </div>
                    </div>
                `;
            }).join('');
        }
        window.onload = loadPosts;
    </script>
</body>
</html>
